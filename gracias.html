  <link rel="stylesheet" href="style.css" />

<body>

  <!-- ============================================

       ============================================ -->

        <li><a href="index.html#que-buscamos" data-i18n="nav.para-quien">Para quién</a></li>
        <li><a href="index.html#casos" data-i18n="nav.casos">Casos</a></li>
        <li><a href="index.html#contacto" class="nav-cta" data-i18n="nav.cta">Quiero el mío</a></li>
      </ul>

        <button class="lang-btn active" data-lang="es">ES</button>
        <span class="lang-sep">/</span>
        <button class="lang-btn" data-lang="en">EN</button>

       ============================================ -->

    <div class="container">
      <div class="gracias-content">
        <h1 data-i18n="gracias.title">¡Gracias por contactarte!</h1>

    </div>

  <!-- ============================================

      <div class="footer-logo">
        <img src="logo-white.png" alt="Interactive Vitae" />

      <ul class="footer-links">
        <li><a href="index.html#que-es" data-i18n="footer.link1">Qué es</a></li>
